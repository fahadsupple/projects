            - link "Supply & Install Velux Skylights" [ref=e155] [cursor=pointer]:
              - /url: https://centralskylights.com.au/skylight-products/
          - paragraph [ref=e156]: Made in USA and Denmark, Velux is a well-known brand in the skylight industry, and for a good reason. Their skylights are known for their high-quality materials and innovative designs. Velux skylights come in a variety of styles, including fixed, vented, and solar-powered. They also offer a range of features such as remote control operation and rain sensors. With Velux skylights, you can bring natural light into your home while also enjoying the convenience of modern technology.
          - figure [ref=e157]:
            - img "Velux Custom Flashing Collingwood" [ref=e158]
