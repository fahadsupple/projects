          - heading "Install and Repair Skylights in Collingwood" [level=2] [ref=e149]
          - paragraph [ref=e150]: Double glazed skylights are a popular choice for homeowners looking to improve their home’s energy efficiency. These skylights have two layers of glass with a layer of gas in between, providing better insulation and reducing heat loss. They also help to reduce outside noise, making them a great option for homes in busy areas. Double glazed skylights are available in various shapes and sizes, making them a versatile choice for any room.
          - figure [ref=e151]:
            - img "Velux skylights Collingwood" [ref=e152]
