o other glass skylight has passed.<\\/p>\\n\\n\\n\\n<h3 class=\\\"wp-block-heading\\\">Velux High Performance Double Glazing<\\/h3>\\n\\n\\n\\n<ul class=\\\"wp-block-list\\\">\\n<li>Radiant heat block complete window approx 80%, glass only approx 75%<\\/li>\\n\\n\\n\\n<li>UV Harmful rays block: 99% \\u2022 Noise reduction factor: 32 decibels<\\/li>\\n\\n\\n\\n<li>WERS rating: 5 stars \\u2022 Double layer of Low-E3 coating.<\\/li>\\n\\n\\n\\n<li>10 year warranty on insulated glass seal.<\\/li>\\n\\n\\n\\n<li>Reduced cleaning frequency \\u2022 Hailstone Test<\\/li>\\n\\n\\n\\n<li>In simulated tests VELUX Skylights withstood cricket ball sized hailstones at speeds experienced during heavy storms.<\\/li>\\n<\\/ul>\\n\\n\\n\\n<h3 class=\\\"wp-block-heading\\\"><strong>NEAT\\u2122 Photocatalytic Coating<\\/strong>&nbsp;<\\/h3>\\n\\n\\n\\n<ul class=\\\"wp-block-list\\\">\\n<li>Silicone Dioxide\\/Titanium Dioxide coating reacts with the sun\\u2019s UV rays to decompose surface organic dirt before rinsing away with the next shower of rain, thereby reducing cleaning frequency.<\\/li>\\n\\n\\n\\n<li>The coating also makes the glass surface smoother, so water disperses evenly, sheets off and evaporates quickly, thereby minimising water spotting on the pane.<\\/li>\\n<\\/ul>\\n<\\/div>\\n\\n\\n\\n<div id=\\\"wp-block-themeisle-blocks-advanced-column-607360b7\\\" class=\\\"wp-block-themeisle-blocks-advanced-column\\\">\\n<h4 class=\\\"wp-block-heading\\\">The world leading manufacturer of skylights<\\/h4>\\n\\n\\n\\n<p>VELUX double glazing provides heat insulation, sound insulation, added strength and safety \\u2013 and protection from the elements. All VELUX Skylights are Double Glazed, Argon gas filled and Low E3 coated.<\\/p>\\n\\n\\n\\n<figure class=\\\"wp-block-image size-full\\\"><img loading=\\\"lazy\\\" decoding=\\\"async\\\" width=\\\"500\\\" height=\\\"250\\\" src=\\\"https:\\/\\/centralskylights.com.au\\/wp-content\\/uploads\\/2025\\/09\\/glass74b.webp\\\" alt=\\\"Doub